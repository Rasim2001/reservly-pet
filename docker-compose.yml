services:
  booking-db:
    image: postgres:16
    environment:
      POSTGRES_DB: bookings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - booking-data:/var/lib/postgresql/data

  notification-db:
    image: postgres:16
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - notification-data:/var/lib/postgresql/data

  auth-db:
      image: postgres:16
      environment:
        POSTGRES_DB: users
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: root
      ports:
        - "5434:5432"
      volumes:
        - auth-data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"

volumes:
  booking-data:
  notification-data:
  auth-data: