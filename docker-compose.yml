services:
  booking-db:
    image: postgres:16
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - booking-data:/var/lib/postgresql/data

  notification-db:
    image: postgres:16
    environment:
      POSTGRES_DB: notification
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - notification-data:/var/lib/postgresql/data

volumes:
  booking-data:
  notification-data: