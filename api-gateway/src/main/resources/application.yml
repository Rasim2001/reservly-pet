server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:

          httpclient:
            connect-timeout: 2000
            response-timeout: 5s

          routes:
            - id: rooms
              uri: http://localhost:8082
              predicates:
                - Path=/api/rooms/**

            - id: bookings
              uri: http://localhost:8082
              predicates:
                - Path=/api/bookings/**
